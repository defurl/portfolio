name: phase-status

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: compute phase status
        run: node scripts/update-phase-status.mjs

      - name: commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain phase-status.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add phase-status.json
            git commit -m "chore(ci): refresh phase status [skip ci]"
            git push
          else
            echo "phase status unchanged"
          fi
