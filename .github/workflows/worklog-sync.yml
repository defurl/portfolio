name: worklog-sync

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: sync worklog
        run: node scripts/sync-worklog.mjs

      - name: commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain worklog.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add worklog.md
            git commit -m "docs(worklog): sync from git log [skip ci]"
            git push
          else
            echo "worklog already in sync"
          fi
