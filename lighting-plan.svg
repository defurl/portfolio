<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
  <!-- ============================================================ -->
  <!-- LAYER 1: NIGHT DESK — TECHNICAL LIGHTING PLAN                -->
  <!-- A spec for Claude Code: exact positions, intensities,        -->
  <!-- decay values, colors. Implementable without rendering.       -->
  <!-- ============================================================ -->

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="1200" fill="#0A0F1A"/>

  <!-- Title -->
  <text x="40" y="60" fill="#EDE6D3" font-size="28" font-weight="600">Layer 1 — Night Desk · Lighting Plan</text>
  <text x="40" y="92" fill="#9BA3B4" font-size="14">Top-down spec for Claude Code · all coordinates in meters · all intensities are R3F PointLight/SpotLight/DirectionalLight values</text>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: PLAN VIEW (top-down)                              -->
  <!-- ============================================================ -->

  <!-- Panel border -->
  <rect x="40" y="120" width="950" height="900" fill="#121826" stroke="#2E3340" stroke-width="1"/>
  <text x="60" y="150" fill="#FFA630" font-size="14" letter-spacing="2">PLAN VIEW · TOP-DOWN</text>
  <text x="60" y="172" fill="#5A6275" font-size="11">+X right · +Z toward camera · origin = desk center · 1 unit = 1 m</text>

  <!-- Grid (1m grid) -->
  <g stroke="#1A2230" stroke-width="0.5">
    <!-- vertical lines, 1m apart. Center of panel = X 515, world origin -->
    <!-- scale: 1m = 200px. Panel area: x 60-970, y 200-1000 -->
    <line x1="115" y1="200" x2="115" y2="1000"/>
    <line x1="315" y1="200" x2="315" y2="1000"/>
    <line x1="515" y1="200" x2="515" y2="1000"/>
    <line x1="715" y1="200" x2="715" y2="1000"/>
    <line x1="915" y1="200" x2="915" y2="1000"/>
    <line x1="60"  y1="240" x2="970" y2="240"/>
    <line x1="60"  y1="440" x2="970" y2="440"/>
    <line x1="60"  y1="640" x2="970" y2="640"/>
    <line x1="60"  y1="840" x2="970" y2="840"/>
  </g>

  <!-- Axis labels -->
  <text x="515" y="195" fill="#5A6275" font-size="10" text-anchor="middle">x=0</text>
  <text x="115" y="195" fill="#5A6275" font-size="10" text-anchor="middle">x=-2</text>
  <text x="915" y="195" fill="#5A6275" font-size="10" text-anchor="middle">x=+2</text>
  <text x="55"  y="244" fill="#5A6275" font-size="10" text-anchor="end">z=-1</text>
  <text x="55"  y="640" fill="#5A6275" font-size="10" text-anchor="end">z=+1</text>
  <text x="55"  y="840" fill="#5A6275" font-size="10" text-anchor="end">z=+2</text>

  <!-- Desk rectangle: 1.8m × 0.9m centered at origin -->
  <!-- World: x -0.9 to +0.9, z -0.45 to +0.45 -->
  <!-- Pixel: x 515 + (-180 to +180), y 640 + (-90 to +90) → 335-695, 550-730 -->
  <rect x="335" y="550" width="360" height="180" fill="none" stroke="#5A6275" stroke-width="2" stroke-dasharray="0"/>
  <text x="515" y="745" fill="#9BA3B4" font-size="11" text-anchor="middle">desk surface · 1.8 × 0.9 m</text>

  <!-- Camera position: [0, _, 1.8] looking at [0, _, 0] -->
  <!-- Pixel: 515, 640 + 360 = 1000 -->
  <g transform="translate(515,1000)">
    <polygon points="0,-10 -25,10 25,10" fill="#FFA630" opacity="0.9"/>
    <line x1="0" y1="-10" x2="0" y2="-440" stroke="#FFA630" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.6"/>
    <!-- FOV cone: 50° → ±25° from forward. tan(25)*440 = ~205px spread -->
    <line x1="0" y1="-10" x2="-205" y2="-440" stroke="#FFA630" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.4"/>
    <line x1="0" y1="-10" x2="205" y2="-440" stroke="#FFA630" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.4"/>
  </g>
  <text x="515" y="1020" fill="#FFA630" font-size="11" text-anchor="middle">camera · y=1.15 · FOV 50°</text>

  <!-- ============================================================ -->
  <!-- LIGHT 1: LAMP (key light) at [-0.95, 0.35, -0.2]              -->
  <!-- Pool radius ≈ 0.9m → 180px                                   -->
  <!-- Pixel: 515 + (-0.95 × 200) = 325, 640 + (-0.2 × 200) = 600   -->
  <!-- ============================================================ -->
  <g opacity="0.85">
    <!-- Outer falloff (20% brightness edge) ~ r=0.9m = 180px -->
    <circle cx="325" cy="600" r="180" fill="#FFB661" opacity="0.10"/>
    <!-- Inner pool (70% brightness) ~ r=0.45m = 90px -->
    <circle cx="325" cy="600" r="90" fill="#FFB661" opacity="0.30"/>
    <!-- Hottest core -->
    <circle cx="325" cy="600" r="20" fill="#FFB661" opacity="0.85"/>
    <circle cx="325" cy="600" r="6" fill="#FFD27A"/>
  </g>
  <line x1="325" y1="600" x2="220" y2="450" stroke="#FFA630" stroke-width="0.5"/>
  <rect x="60" y="410" width="170" height="60" fill="#0A0F1A" stroke="#FFA630" stroke-width="1"/>
  <text x="68" y="428" fill="#FFA630" font-size="11" font-weight="600">KEY · LAMP</text>
  <text x="68" y="445" fill="#EDE6D3" font-size="10">pos: [-0.95, 0.35, -0.2]</text>
  <text x="68" y="460" fill="#EDE6D3" font-size="10">PointLight · #FFB661 · I=8 · d=2</text>

  <!-- ============================================================ -->
  <!-- LIGHT 2 & 3: MONITOR FILLS at [-0.3, 0.55, -0.4] and [0.5, 0.55, -0.4] -->
  <!-- Pixel: 515 + (-0.3×200) = 455, 640 + (-0.4×200) = 560        -->
  <!-- Pixel: 515 + (0.5×200) = 615, 640 + (-0.4×200) = 560         -->
  <!-- ============================================================ -->
  <g opacity="0.8">
    <circle cx="455" cy="560" r="100" fill="#5BC8FF" opacity="0.12"/>
    <circle cx="455" cy="560" r="40" fill="#5BC8FF" opacity="0.35"/>
    <circle cx="455" cy="560" r="6" fill="#5BC8FF"/>

    <circle cx="615" cy="560" r="100" fill="#5BC8FF" opacity="0.12"/>
    <circle cx="615" cy="560" r="40" fill="#5BC8FF" opacity="0.35"/>
    <circle cx="615" cy="560" r="6" fill="#5BC8FF"/>
  </g>
  <line x1="455" y1="560" x2="455" y2="350" stroke="#5BC8FF" stroke-width="0.5"/>
  <rect x="365" y="290" width="200" height="60" fill="#0A0F1A" stroke="#5BC8FF" stroke-width="1"/>
  <text x="373" y="308" fill="#5BC8FF" font-size="11" font-weight="600">FILL · MONITOR 1 + 2</text>
  <text x="373" y="325" fill="#EDE6D3" font-size="10">pos: [-0.3, 0.55, -0.4] · [0.5, 0.55, -0.4]</text>
  <text x="373" y="340" fill="#EDE6D3" font-size="10">PointLight · #5BC8FF · I=3.2 each · d=1.5</text>

  <!-- ============================================================ -->
  <!-- LIGHT 4: WINDOW RIM (DirectionalLight)                       -->
  <!-- Direction: from approx [+1.4, 1.0, -0.6] toward origin       -->
  <!-- Pixel: 515 + (1.4×200) = 795, 640 + (-0.6×200) = 520         -->
  <!-- ============================================================ -->
  <g opacity="0.85">
    <!-- A directional light is shown as an arrow with rays -->
    <g transform="translate(795,520) rotate(225)">
      <line x1="0" y1="0" x2="-80" y2="0" stroke="#5BC8FF" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="-20" y1="-20" x2="-60" y2="-20" stroke="#2A6B8A" stroke-width="1.5"/>
      <line x1="-20" y1="20" x2="-60" y2="20" stroke="#2A6B8A" stroke-width="1.5"/>
    </g>
    <circle cx="795" cy="520" r="8" fill="#5BC8FF"/>
    <text x="810" y="525" fill="#5BC8FF" font-size="11">window</text>
  </g>
  <line x1="795" y1="520" x2="900" y2="430" stroke="#5BC8FF" stroke-width="0.5"/>
  <rect x="750" y="370" width="220" height="60" fill="#0A0F1A" stroke="#5BC8FF" stroke-width="1"/>
  <text x="758" y="388" fill="#5BC8FF" font-size="11" font-weight="600">RIM · WINDOW (directional)</text>
  <text x="758" y="405" fill="#EDE6D3" font-size="10">from: [+1.4, 1.0, -0.6] → origin</text>
  <text x="758" y="420" fill="#EDE6D3" font-size="10">DirectionalLight · #2A6B8A · I=1.2</text>

  <!-- ============================================================ -->
  <!-- LIGHT 5: DOOR SPILL at [-1.8, 0.4, 1.0]                      -->
  <!-- Pixel: 515 + (-1.8×200) = 155, 640 + (1.0×200) = 840         -->
  <!-- ============================================================ -->
  <g opacity="0.85">
    <circle cx="155" cy="840" r="120" fill="#FFB661" opacity="0.08"/>
    <circle cx="155" cy="840" r="60" fill="#FFB661" opacity="0.20"/>
    <circle cx="155" cy="840" r="6" fill="#FFB661"/>
  </g>
  <line x1="155" y1="840" x2="280" y2="950" stroke="#FFA630" stroke-width="0.5"/>
  <rect x="270" y="940" width="200" height="60" fill="#0A0F1A" stroke="#FFA630" stroke-width="1"/>
  <text x="278" y="958" fill="#FFA630" font-size="11" font-weight="600">DOOR SPILL (off-frame)</text>
  <text x="278" y="975" fill="#EDE6D3" font-size="10">pos: [-1.8, 0.4, 1.0]</text>
  <text x="278" y="990" fill="#EDE6D3" font-size="10">PointLight · #FFB661 · I=2.4 · d=2.5</text>

  <!-- ============================================================ -->
  <!-- AMBIENT (no position) — just a note                          -->
  <!-- ============================================================ -->
  <rect x="800" y="940" width="170" height="60" fill="#0A0F1A" stroke="#5A6275" stroke-width="1"/>
  <text x="808" y="958" fill="#9BA3B4" font-size="11" font-weight="600">AMBIENT (global)</text>
  <text x="808" y="975" fill="#EDE6D3" font-size="10">AmbientLight</text>
  <text x="808" y="990" fill="#EDE6D3" font-size="10">#0A0F1A · I=0.15</text>

  <!-- Object dots inside desk -->
  <g fill="#9BA3B4" opacity="0.6">
    <!-- Monitor 1 -->
    <rect x="445" y="552" width="20" height="14" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <!-- Monitor 2 -->
    <rect x="605" y="552" width="18" height="14" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <!-- Keyboard at [0, 0.04, 0.2] → 515, 680 -->
    <rect x="475" y="672" width="80" height="16" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <text x="515" y="703" font-size="9" text-anchor="middle">kb</text>
    <!-- Mug at [-0.55, 0.06, 0.35] → 405, 710 -->
    <circle cx="405" cy="710" r="8" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <!-- Notebook at [-0.05, 0.025, 0.4] → 505, 720 -->
    <rect x="490" y="712" width="30" height="20" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <!-- Plant at [-0.8, 0.12, 0.1] → 355, 660 -->
    <circle cx="355" cy="660" r="11" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <!-- Headphones at [0.85, 0.04, 0.15] → 685, 670 -->
    <circle cx="685" cy="670" r="10" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <!-- Phone at [1.0, 0.012, -0.05] → 715, 630 (just past desk edge — adjust to be IN desk: 695, 630) -->
    <rect x="678" y="618" width="14" height="24" fill="#1A2230" stroke="#5A6275" stroke-width="0.5"/>
    <!-- Lamp at [-0.95, 0.35, -0.2] → 325, 600 — already shown as light source -->
  </g>

  <!-- Arrow marker for directional light -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5BC8FF"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: INTENSITY RATIOS + COLOR PALETTE + ACCEPTANCE   -->
  <!-- ============================================================ -->
  <rect x="1010" y="120" width="550" height="900" fill="#121826" stroke="#2E3340" stroke-width="1"/>

  <!-- Section: Intensity ratios -->
  <text x="1030" y="150" fill="#FFA630" font-size="14" letter-spacing="2">INTENSITY RATIOS</text>
  <text x="1030" y="172" fill="#5A6275" font-size="11">Relative to KEY=1.0 · these become R3F intensity values shown left</text>

  <g font-size="11" fill="#EDE6D3">
    <!-- Bar chart -->
    <text x="1030" y="210">KEY (lamp)</text>
    <rect x="1140" y="200" width="320" height="14" fill="#FFB661"/>
    <text x="1470" y="212" fill="#FFD27A" font-size="10">1.0 · I=8.0</text>

    <text x="1030" y="244">FILL (monitor 1)</text>
    <rect x="1140" y="234" width="128" height="14" fill="#5BC8FF"/>
    <text x="1280" y="246" fill="#5BC8FF" font-size="10">0.4 · I=3.2</text>

    <text x="1030" y="278">FILL (monitor 2)</text>
    <rect x="1140" y="268" width="128" height="14" fill="#5BC8FF"/>
    <text x="1280" y="280" fill="#5BC8FF" font-size="10">0.4 · I=3.2</text>

    <text x="1030" y="312">RIM (window)</text>
    <rect x="1140" y="302" width="48" height="14" fill="#2A6B8A"/>
    <text x="1200" y="314" fill="#5BC8FF" font-size="10">0.15 · I=1.2</text>

    <text x="1030" y="346">DOOR SPILL</text>
    <rect x="1140" y="336" width="96" height="14" fill="#FFB661" opacity="0.7"/>
    <text x="1250" y="348" fill="#FFA630" font-size="10">0.3 · I=2.4</text>

    <text x="1030" y="380">AMBIENT</text>
    <rect x="1140" y="370" width="12" height="14" fill="#0A0F1A" stroke="#5A6275"/>
    <text x="1162" y="382" fill="#9BA3B4" font-size="10">0.04 · I=0.15</text>
  </g>

  <!-- Section: Color palette -->
  <text x="1030" y="440" fill="#FFA630" font-size="14" letter-spacing="2">COLOR PALETTE</text>
  <text x="1030" y="462" fill="#5A6275" font-size="11">Exact values from src/lib/style/colors.ts · no improvising</text>

  <g font-size="11" fill="#EDE6D3">
    <rect x="1030" y="478" width="20" height="20" fill="#FFB661"/>
    <text x="1058" y="494">LAMP_WARM</text>
    <text x="1200" y="494" fill="#9BA3B4">#FFB661</text>
    <text x="1300" y="494" fill="#5A6275" font-size="10">lamp bulb, door spill, lamp shade inner</text>

    <rect x="1030" y="506" width="20" height="20" fill="#5BC8FF"/>
    <text x="1058" y="522">VOXEL_GLOW</text>
    <text x="1200" y="522" fill="#9BA3B4">#5BC8FF</text>
    <text x="1300" y="522" fill="#5A6275" font-size="10">monitor fill point lights</text>

    <rect x="1030" y="534" width="20" height="20" fill="#2A6B8A"/>
    <text x="1058" y="550">VOXEL_GLOW_SOFT</text>
    <text x="1200" y="550" fill="#9BA3B4">#2A6B8A</text>
    <text x="1300" y="550" fill="#5A6275" font-size="10">window rim, monitor 2 screen</text>

    <rect x="1030" y="562" width="20" height="20" fill="#7A4F18"/>
    <text x="1058" y="578">SIGNAL_AMBER_DIM</text>
    <text x="1200" y="578" fill="#9BA3B4">#7A4F18</text>
    <text x="1300" y="578" fill="#5A6275" font-size="10">monitor 1 screen emissive tint</text>

    <rect x="1030" y="590" width="20" height="20" fill="#0A0F1A" stroke="#5A6275"/>
    <text x="1058" y="606">BG_NIGHT</text>
    <text x="1200" y="606" fill="#9BA3B4">#0A0F1A</text>
    <text x="1300" y="606" fill="#5A6275" font-size="10">ambient color · void</text>

    <rect x="1030" y="618" width="20" height="20" fill="#121826" stroke="#5A6275"/>
    <text x="1058" y="634">BG_PANEL</text>
    <text x="1200" y="634" fill="#9BA3B4">#121826</text>
    <text x="1300" y="634" fill="#5A6275" font-size="10">desk surface, floor, walls (roughness 0.85)</text>

    <rect x="1030" y="646" width="20" height="20" fill="#EDE6D3"/>
    <text x="1058" y="662">INK_PAPER</text>
    <text x="1200" y="662" fill="#9BA3B4">#EDE6D3</text>
    <text x="1300" y="662" fill="#5A6275" font-size="10">label text only — no emissive use</text>
  </g>

  <!-- Section: Material settings -->
  <text x="1030" y="710" fill="#FFA630" font-size="14" letter-spacing="2">MATERIALS</text>
  <g font-size="11" fill="#EDE6D3">
    <text x="1030" y="734">Desk + floor + walls</text>
    <text x="1200" y="734" fill="#9BA3B4">roughness 0.85 · metalness 0.05</text>
    <text x="1030" y="754">Lamp shade (outside)</text>
    <text x="1200" y="754" fill="#9BA3B4">roughness 0.6 · metalness 0.7 · color #1A2230</text>
    <text x="1030" y="774">Lamp shade (inside)</text>
    <text x="1200" y="774" fill="#9BA3B4">emissive #FFB661 · intensity 0.4 · reflects warm bounce</text>
    <text x="1030" y="794">Lamp bulb</text>
    <text x="1200" y="794" fill="#9BA3B4">MeshBasicMaterial · #FFB661 · bloom target</text>
    <text x="1030" y="814">Monitor 1 screen</text>
    <text x="1200" y="814" fill="#9BA3B4">emissive #7A4F18 · intensity 1.2 · bloom target</text>
    <text x="1030" y="834">Monitor 2 screen</text>
    <text x="1200" y="834" fill="#9BA3B4">emissive #2A6B8A · intensity 1.0 · bloom target</text>
    <text x="1030" y="854">Window glass</text>
    <text x="1200" y="854" fill="#9BA3B4">MeshPhysicalMaterial · transmission 0.3 · ior 1.45 · NOT a flat plane</text>
    <text x="1030" y="874">Coffee mug + phone + headphones</text>
    <text x="1200" y="874" fill="#9BA3B4">roughness 0.3 · metalness 0.1 (subtle highlight catchers)</text>
    <text x="1030" y="894">Plant pot + notebook + lamp arm</text>
    <text x="1200" y="894" fill="#9BA3B4">roughness 0.9 · metalness 0 (matte)</text>
  </g>

  <!-- Section: Acceptance test -->
  <text x="1030" y="940" fill="#4ADE80" font-size="14" letter-spacing="2">ACCEPTANCE TEST</text>
  <text x="1030" y="962" fill="#5A6275" font-size="11">All five must read TRUE in the lighting-only screenshot:</text>
  <g font-size="11" fill="#EDE6D3">
    <text x="1030" y="982">☐ The lamp pool is visibly the brightest area in frame</text>
    <text x="1030" y="998">☐ The right edge of the scene reads measurably cooler than the left</text>
    <text x="1030" y="1014">☐ A warm rectangle of light is visible on the floor at camera-left</text>
    <text x="1030" y="1030">☐ The keyboard area sits in the lamp's outer falloff (~20% brightness)</text>
    <text x="1030" y="1046">☐ No object is pure black; no object is fully lit by ambient flood</text>
  </g>

  <!-- ============================================================ -->
  <!-- BOTTOM STRIP: color-zone visualization                       -->
  <!-- ============================================================ -->
  <text x="40" y="1060" fill="#FFA630" font-size="14" letter-spacing="2">COLOR-TEMPERATURE ZONES (camera POV horizontal split)</text>
  <defs>
    <linearGradient id="warmtocool" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#FFB661" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#7A4F18" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#0A0F1A" stop-opacity="0.2"/>
      <stop offset="80%" stop-color="#2A6B8A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5BC8FF" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect x="40" y="1075" width="1520" height="60" fill="url(#warmtocool)" stroke="#2E3340" stroke-width="1"/>
  <text x="120" y="1112" fill="#EDE6D3" font-size="11">door spill</text>
  <text x="280" y="1112" fill="#EDE6D3" font-size="11">lamp pool</text>
  <text x="480" y="1112" fill="#EDE6D3" font-size="11">monitor 1 (warm tint)</text>
  <text x="720" y="1112" fill="#EDE6D3" font-size="11">center · dim</text>
  <text x="980" y="1112" fill="#EDE6D3" font-size="11">monitor 2 (cool)</text>
  <text x="1230" y="1112" fill="#EDE6D3" font-size="11">window rim</text>
  <text x="1430" y="1112" fill="#EDE6D3" font-size="11">city beyond</text>

  <text x="40" y="1170" fill="#5A6275" font-size="10">v1 · for Claude Code Phase 1 Checkpoint A · matches src/lib/style/colors.ts · supersedes prose-only lighting brief in phase-1-final-prompt.md</text>
</svg>
